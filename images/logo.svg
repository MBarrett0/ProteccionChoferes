<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Outer circle -->
  <circle cx="60" cy="60" r="58" fill="#62AA23" stroke="#ffffff" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <!-- Steering wheel hub -->
  <circle cx="60" cy="60" r="10" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Steering wheel ring -->
  <circle cx="60" cy="60" r="30" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Spokes -->
  <line x1="60" y1="50" x2="60" y2="30" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="70" x2="60" y2="90" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="60" x2="30" y2="60" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="70" y1="60" x2="90" y2="60" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Abbreviation text -->
  <text x="60" y="108" text-anchor="middle" font-family="'Titillium Web', Arial, sans-serif" font-size="8" font-weight="700" fill="#ffffff" letter-spacing="1">CPCH</text>
</svg>
